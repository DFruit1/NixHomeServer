# Codex CLI local command policy for this repository.
#
# Intended effect:
# - Block clearly dangerous host-destructive commands.
# - Require explicit approval for sensitive state-changing commands.
# - Allow normal read/build/test workflows by default.

version = 1

[policy]
default_action = "allow"

[[rule]]
name = "allow-filesystem-inspection"
action = "allow"
match = "^\\s*(pwd|ls|tree|find|rg|cat|less|more|head|tail|wc|stat|file|realpath|readlink|printenv|which|type|tr)\\b"
reason = "Allow local filesystem and shell inspection commands without prompts."

[[rule]]
name = "allow-process-inspection"
action = "allow"
match = "^\\s*(ps|pgrep|ss)\\b"
reason = "Allow local process and socket inspection commands without prompts."

[[rule]]
name = "allow-network-inspection"
action = "allow"
match = "^\\s*ip\\s+(-br\\s+)?addr\\b"
reason = "Allow local network address inspection without prompts."

[[rule]]
name = "allow-system-status-inspection"
action = "allow"
match = "^\\s*(journalctl|systemctl\\s+status|systemctl\\s+is-system-running)\\b"
reason = "Allow local system status inspection without prompts."

[[rule]]
name = "allow-git-read-only"
action = "allow"
match = "^\\s*git\\s+(status|diff|show|log|branch|remote|rev-parse)\\b"
reason = "Allow read-only Git inspection without prompts."

[[rule]]
name = "allow-nix-read-only"
action = "allow"
match = "^\\s*nix\\s+(flake\\s+(show|metadata|check)|eval|path-info|store\\s+prefetch-file)\\b"
reason = "Allow read-only Nix inspection without prompts."

[[rule]]
name = "allow-deploy-rs-via-nix-run"
action = "allow"
match = "^\\s*nix\\s+.*run\\s+github:serokell/deploy-rs\\s+--\\s+.+$"
reason = "Allow the documented deploy-rs invocation used for host deployment."

[[rule]]
name = "allow-ssh-basic-probes"
action = "allow"
match = "^\\s*ssh\\s+.+\\s+(\"|')?(true|uptime|hostname|id|whoami|pwd|uname\\s|nixos-rebuild\\s+--version)($|\\s.*)(\"|')?\\s*$"
reason = "Allow basic read-only SSH probes used to verify remote access."

[[rule]]
name = "allow-ssh-remote-file-inspection"
action = "allow"
match = "^\\s*ssh\\s+.+\\s+(\"|')?(ls(\\s|$)|cat\\s|head\\s|tail\\s|readlink\\s+-f\\s+/run/current-system)($|\\s.*)(\"|')?\\s*$"
reason = "Allow read-only remote file inspection over SSH."

[[rule]]
name = "allow-ssh-remote-system-status"
action = "allow"
match = "^\\s*ssh\\s+.+\\s+(\"|')?(free\\s+-h|df\\s+-h|ps\\s+-e|systemctl\\s+status|systemctl\\s+is-system-running|systemctl\\s+--failed|journalctl\\s+-u)($|\\s.*)(\"|')?\\s*$"
reason = "Allow read-only remote system health checks over SSH."

[[rule]]
name = "allow-ssh-remote-nix-status"
action = "allow"
match = "^\\s*ssh\\s+.+\\s+(\"|')?nix-env\\s+-p\\s+/nix/var/nix/profiles/system\\s+--list-generations($|\\s.*)(\"|')?\\s*$"
reason = "Allow read-only remote NixOS generation inspection over SSH."

[[rule]]
name = "deny-destructive-delete"
action = "deny"
match = "^\\s*(sudo\\s+)?rm\\s+(-[A-Za-z]*[rf][A-Za-z]*\\s+)+((--no-preserve-root|--preserve-root=0)\\s+)?(/(\\s|$)|/\\*|~(/|\\s|$)|\\.\\.(\\s|/|$))"
reason = "Refuse high-risk recursive deletion targets."

[[rule]]
name = "deny-disk-wipe"
action = "deny"
match = "^\\s*(wipefs|sgdisk|dd)\\b"
reason = "Disk-destructive commands must never run from Codex CLI automation."

[[rule]]
name = "deny-force-power-ops"
action = "deny"
match = "^\\s*(reboot|shutdown|poweroff|halt)\\b"
reason = "Prevent host availability impact from automation."

[[rule]]
name = "ask-before-package-manager-write"
action = "ask"
match = "^\\s*(apt(-get)?|dnf|yum|pacman|zypper)\\s+(install|remove|purge|upgrade)\\b"
reason = "Package manager writes should be explicitly approved."

[[rule]]
name = "ask-before-network-side-effects"
action = "ask"
match = "^\\s*(git\\s+push|gh\\s+|curl\\s+.+\\|\\s*sh|wget\\s+.+\\|\\s*sh)"
reason = "Outbound publish/remote execution requires explicit approval."

[[rule]]
name = "ask-before-firewall-or-network-reconfig"
action = "ask"
match = "^\\s*(iptables|nft|ufw|nmcli|ip\\s+route|ip\\s+link)\\b"
reason = "Networking changes can break remote access."
